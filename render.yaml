databases:
  - name: store-online-db
    plan: free
    databaseName: store_online
    user: store_user

services:
  - type: web
    name: store-online-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: store-online-db
          property: connectionString
      - key: DB_SSL
        value: true
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_NAME
        value: sid_store
      - key: SESSION_COOKIE_SECURE
        value: true

  - type: static_site
    name: store-online-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://store-online-api.onrender.com/api
